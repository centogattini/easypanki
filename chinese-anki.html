<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="汉字">
<title>汉字 Anki</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700&family=Noto+Sans+SC:wght@300;400&family=Playfair+Display:ital,wght@0,700;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #1a1008;
    --paper: #f5f0e8;
    --paper-dark: #ede6d6;
    --red: #c0392b;
    --red-light: #e8d5d3;
    --gold: #b8860b;
    --faded: #8c7b6b;
    --border: #d4c9b5;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--paper);
    color: var(--ink);
    font-family: 'Noto Sans SC', sans-serif;
    min-height: 100vh;
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    position: relative;
    overflow-x: hidden;
  }

  /* Subtle paper texture */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: 
      repeating-linear-gradient(0deg, transparent, transparent 28px, rgba(180,160,120,0.07) 28px, rgba(180,160,120,0.07) 29px);
    pointer-events: none;
    z-index: 0;
  }

  /* Vertical red stripe — like a Chinese notebook */
  body::after {
    content: '';
    position: fixed;
    top: 0; bottom: 0;
    left: 52px;
    width: 1.5px;
    background: rgba(192,57,43,0.18);
    pointer-events: none;
    z-index: 0;
  }

  header {
    position: relative;
    z-index: 1;
    padding: 28px 24px 16px 72px;
    border-bottom: 1px solid var(--border);
  }

  header h1 {
    font-family: 'Playfair Display', serif;
    font-size: 13px;
    font-weight: 400;
    font-style: italic;
    color: var(--faded);
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  header .char {
    font-family: 'Noto Serif SC', serif;
    font-size: 32px;
    font-weight: 700;
    color: var(--ink);
    line-height: 1;
    margin-top: 2px;
  }

  main {
    flex: 1;
    position: relative;
    z-index: 1;
    padding: 24px 20px 100px 72px;
    display: flex;
    flex-direction: column;
    gap: 0;
  }

  .input-group {
    margin-bottom: 20px;
  }

  label {
    display: block;
    font-size: 10px;
    font-weight: 400;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--faded);
    margin-bottom: 6px;
  }

  input, textarea {
    width: 100%;
    background: transparent;
    border: none;
    border-bottom: 1px solid var(--border);
    padding: 8px 0;
    font-family: 'Noto Sans SC', sans-serif;
    font-size: 16px;
    color: var(--ink);
    outline: none;
    transition: border-color 0.2s;
    -webkit-appearance: none;
    border-radius: 0;
  }

  input:focus, textarea:focus {
    border-bottom-color: var(--red);
  }

  input::placeholder, textarea::placeholder {
    color: var(--border);
  }

  textarea {
    resize: none;
    height: 44px;
    line-height: 1.5;
  }

  .hanzi-field input {
    font-family: 'Noto Serif SC', serif;
    font-size: 22px;
  }

  .pinyin-field input {
    font-style: italic;
    color: #5a4a3a;
  }

  .divider {
    height: 1px;
    background: var(--border);
    margin: 8px 0 24px 0;
    position: relative;
  }

  .divider::before {
    content: '例句';
    position: absolute;
    left: 0;
    top: -9px;
    font-size: 10px;
    letter-spacing: 0.1em;
    color: var(--faded);
    background: var(--paper);
    padding-right: 8px;
  }

  /* Generate button */
  .btn-generate {
    position: relative;
    z-index: 1;
    width: 100%;
    margin-top: 4px;
    padding: 14px 20px;
    background: var(--ink);
    color: var(--paper);
    border: none;
    font-family: 'Noto Sans SC', sans-serif;
    font-size: 13px;
    letter-spacing: 0.1em;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    transition: background 0.2s;
    -webkit-appearance: none;
    border-radius: 0;
  }

  .btn-generate:active { background: #3a2a1a; }
  .btn-generate:disabled { background: var(--faded); cursor: not-allowed; }

  .btn-generate .spinner {
    width: 14px; height: 14px;
    border: 1.5px solid rgba(245,240,232,0.3);
    border-top-color: var(--paper);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    display: none;
  }

  .btn-generate.loading .spinner { display: block; }
  .btn-generate.loading .btn-text { opacity: 0.6; }

  @keyframes spin { to { transform: rotate(360deg); } }

  /* Fields area */
  .fields {
    margin-top: 28px;
    opacity: 0;
    transform: translateY(8px);
    transition: opacity 0.4s ease, transform 0.4s ease;
    pointer-events: none;
  }

  .fields.visible {
    opacity: 1;
    transform: translateY(0);
    pointer-events: all;
  }

  /* Add to Anki button */
  .btn-anki {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    z-index: 10;
    padding: 18px 20px;
    padding-bottom: calc(18px + env(safe-area-inset-bottom));
    background: var(--red);
    color: white;
    border: none;
    font-family: 'Noto Sans SC', sans-serif;
    font-size: 14px;
    font-weight: 400;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    cursor: pointer;
    display: none;
    align-items: center;
    justify-content: center;
    gap: 12px;
    transition: background 0.2s;
    -webkit-appearance: none;
    border-radius: 0;
  }

  .btn-anki.visible { display: flex; }
  .btn-anki:active { background: #962d22; }

  .btn-anki .anki-icon {
    font-family: 'Noto Serif SC', serif;
    font-size: 18px;
    font-weight: 700;
  }

  /* Error */
  .error {
    margin-top: 12px;
    padding: 10px 14px;
    background: var(--red-light);
    border-left: 3px solid var(--red);
    font-size: 13px;
    color: var(--red);
    display: none;
  }
  .error.visible { display: block; }

  /* API key notice */
  .api-notice {
    position: relative;
    z-index: 1;
    margin: 0 20px 0 72px;
    padding: 10px 14px;
    background: var(--paper-dark);
    border-left: 2px solid var(--gold);
    font-size: 12px;
    color: var(--faded);
    line-height: 1.5;
  }

  .api-notice a {
    color: var(--gold);
    text-decoration: none;
    border-bottom: 1px solid var(--gold);
  }

  .api-key-input {
    margin-top: 8px;
  }

  .api-key-input input {
    font-size: 13px;
    font-family: monospace;
  }

  /* Success flash */
  .success-flash {
    position: fixed;
    inset: 0;
    background: rgba(192,57,43,0.08);
    pointer-events: none;
    opacity: 0;
    z-index: 100;
    transition: opacity 0.3s;
  }
  .success-flash.show { opacity: 1; }
</style>
</head>
<body>

<header>
  <h1>vocabulary builder</h1>
  <div class="char">汉字</div>
</header>

<div class="api-notice" id="apiNotice">
  Paste your <a href="https://console.anthropic.com/settings/keys" target="_blank">Anthropic API key</a> to enable AI generation.
  <div class="api-key-input">
    <input type="password" id="apiKeyInput" placeholder="sk-ant-..." autocomplete="off" spellcheck="false">
  </div>
</div>

<main>
  <div class="input-group">
    <label>English word</label>
    <input type="text" id="englishInput" placeholder="e.g. perseverance" autocomplete="off" autocorrect="off" autocapitalize="none" spellcheck="false">
  </div>

  <button class="btn-generate" id="generateBtn" onclick="generate()">
    <div class="spinner"></div>
    <span class="btn-text">Generate card</span>
  </button>

  <div class="error" id="errorBox"></div>

  <div class="fields" id="fieldsArea">
    <div class="input-group hanzi-field">
      <label>Hanzi</label>
      <input type="text" id="fldHanzi" autocomplete="off" autocorrect="off" spellcheck="false">
    </div>
    <div class="input-group pinyin-field">
      <label>Pinyin</label>
      <input type="text" id="fldPinyin" autocomplete="off" autocorrect="off" spellcheck="false">
    </div>

    <div class="divider"></div>

    <div class="input-group hanzi-field">
      <label>Usage — Hanzi</label>
      <textarea id="fldUsageHanzi" autocomplete="off" autocorrect="off" spellcheck="false"></textarea>
    </div>
    <div class="input-group pinyin-field">
      <label>Usage — Pinyin</label>
      <textarea id="fldUsagePinyin" autocomplete="off" autocorrect="off" spellcheck="false"></textarea>
    </div>
  </div>
</main>

<button class="btn-anki" id="ankiBtn" onclick="sendToAnki()">
  <span class="anki-icon">卡</span>
  Add to Anki
</button>

<div class="success-flash" id="successFlash"></div>

<script>
const PROFILE = 'User 1';
const DECK = 'ChineseVocab';
const NOTE_TYPE = 'Chinese';

function getApiKey() {
  return document.getElementById('apiKeyInput').value.trim() ||
         localStorage.getItem('anthropic_key') || '';
}

document.getElementById('apiKeyInput').addEventListener('change', function() {
  if (this.value.trim()) localStorage.setItem('anthropic_key', this.value.trim());
});

// Pre-fill saved key
const savedKey = localStorage.getItem('anthropic_key');
if (savedKey) {
  document.getElementById('apiKeyInput').value = savedKey;
}

document.getElementById('englishInput').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') generate();
});

function showError(msg) {
  const box = document.getElementById('errorBox');
  box.textContent = msg;
  box.classList.add('visible');
}

function hideError() {
  document.getElementById('errorBox').classList.remove('visible');
}

async function generate() {
  const english = document.getElementById('englishInput').value.trim();
  if (!english) return;

  const apiKey = getApiKey();
  if (!apiKey) {
    showError('Please enter your Anthropic API key above.');
    return;
  }

  hideError();
  const btn = document.getElementById('generateBtn');
  btn.classList.add('loading');
  btn.disabled = true;

  document.getElementById('fieldsArea').classList.remove('visible');
  document.getElementById('ankiBtn').classList.remove('visible');

  try {
    const prompt = `Generate a Chinese flashcard for the English word: "${english}"

Return ONLY a JSON object with exactly these keys:
{
  "hanzi": "the Chinese word/phrase in characters",
  "pinyin": "pinyin with tone marks",
  "usage_hanzi": "one natural example sentence in Chinese characters",
  "usage_pinyin": "the same example sentence in pinyin with tone marks"
}

Rules:
- Choose the most common/natural Chinese translation
- Use standard Mandarin
- Example sentence should be simple, natural, and illustrate the word's meaning
- Return ONLY the JSON, no other text`;

    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': apiKey,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        messages: [{ role: 'user', content: prompt }]
      })
    });

    if (!response.ok) {
      const err = await response.json();
      throw new Error(err.error?.message || `API error ${response.status}`);
    }

    const data = await response.json();
    const text = data.content[0].text.trim();
    const clean = text.replace(/```json|```/g, '').trim();
    const card = JSON.parse(clean);

    document.getElementById('fldHanzi').value = card.hanzi || '';
    document.getElementById('fldPinyin').value = card.pinyin || '';
    document.getElementById('fldUsageHanzi').value = card.usage_hanzi || '';
    document.getElementById('fldUsagePinyin').value = card.usage_pinyin || '';

    document.getElementById('fieldsArea').classList.add('visible');
    document.getElementById('ankiBtn').classList.add('visible');

  } catch (e) {
    showError('Error: ' + e.message);
  } finally {
    btn.classList.remove('loading');
    btn.disabled = false;
  }
}

function sendToAnki() {
  const english = document.getElementById('englishInput').value.trim();
  const hanzi = document.getElementById('fldHanzi').value.trim();
  const pinyin = document.getElementById('fldPinyin').value.trim();
  const usageHanzi = document.getElementById('fldUsageHanzi').value.trim();
  const usagePinyin = document.getElementById('fldUsagePinyin').value.trim();

  const enc = encodeURIComponent;

  const url = `anki://x-callback-url/addnote?profile=${enc(PROFILE)}&type=${enc(NOTE_TYPE)}&deck=${enc(DECK)}&fldenglish=${enc(english)}&fldhanzi=${enc(hanzi)}&fldpinyin=${enc(pinyin)}&fldusage%20hanzi=${enc(usageHanzi)}&fldusage%20pinyin=${enc(usagePinyin)}`;

  // Flash feedback
  const flash = document.getElementById('successFlash');
  flash.classList.add('show');
  setTimeout(() => flash.classList.remove('show'), 300);

  window.location.href = url;
}
</script>
</body>
</html>
