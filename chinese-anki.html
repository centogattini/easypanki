<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="汉字">
<title>汉字 Anki</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700&family=Noto+Sans+SC:wght@300;400&family=Playfair+Display:ital,wght@0,700;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #1a1008;
    --paper: #f5f0e8;
    --paper-dark: #ede6d6;
    --red: #c0392b;
    --red-light: #e8d5d3;
    --gold: #b8860b;
    --faded: #8c7b6b;
    --border: #d4c9b5;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--paper);
    color: var(--ink);
    font-family: 'Noto Sans SC', sans-serif;
    min-height: 100vh;
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    position: relative;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: repeating-linear-gradient(0deg, transparent, transparent 28px, rgba(180,160,120,0.07) 28px, rgba(180,160,120,0.07) 29px);
    pointer-events: none;
    z-index: 0;
  }

  body::after {
    content: '';
    position: fixed;
    top: 0; bottom: 0;
    left: 52px;
    width: 1.5px;
    background: rgba(192,57,43,0.18);
    pointer-events: none;
    z-index: 0;
  }

  header {
    position: relative;
    z-index: 1;
    padding: 28px 24px 16px 72px;
    border-bottom: 1px solid var(--border);
  }

  header h1 {
    font-family: 'Playfair Display', serif;
    font-size: 13px;
    font-weight: 400;
    font-style: italic;
    color: var(--faded);
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  header .char {
    font-family: 'Noto Serif SC', serif;
    font-size: 32px;
    font-weight: 700;
    color: var(--ink);
    line-height: 1;
    margin-top: 2px;
  }

  .api-notice {
    position: relative;
    z-index: 1;
    margin: 16px 20px 0 72px;
    padding: 10px 14px;
    background: var(--paper-dark);
    border-left: 2px solid var(--gold);
    font-size: 12px;
    color: var(--faded);
    line-height: 1.6;
  }

  .api-notice a { color: var(--gold); text-decoration: none; border-bottom: 1px solid var(--gold); }

  .api-key-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-top: 8px;
  }

  .api-key-row input {
    flex: 1;
    background: transparent;
    border: none;
    border-bottom: 1px solid var(--border);
    padding: 6px 0;
    font-family: monospace;
    font-size: 12px;
    color: var(--ink);
    outline: none;
    -webkit-appearance: none;
    border-radius: 0;
  }

  .api-key-row input:focus { border-bottom-color: var(--gold); }

  .btn-save-key {
    padding: 5px 10px;
    background: var(--gold);
    color: white;
    border: none;
    font-size: 11px;
    letter-spacing: 0.05em;
    cursor: pointer;
    font-family: 'Noto Sans SC', sans-serif;
    white-space: nowrap;
    -webkit-appearance: none;
    border-radius: 0;
  }

  .key-saved { font-size: 11px; color: var(--gold); margin-top: 4px; display: none; }
  .key-saved.visible { display: block; }

  main {
    flex: 1;
    position: relative;
    z-index: 1;
    padding: 24px 20px 130px 72px;
    display: flex;
    flex-direction: column;
  }

  .input-group { margin-bottom: 20px; }

  label {
    display: block;
    font-size: 10px;
    font-weight: 400;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--faded);
    margin-bottom: 6px;
  }

  input[type=text], textarea {
    width: 100%;
    background: transparent;
    border: none;
    border-bottom: 1px solid var(--border);
    padding: 8px 0;
    font-family: 'Noto Sans SC', sans-serif;
    font-size: 16px;
    color: var(--ink);
    outline: none;
    transition: border-color 0.2s;
    -webkit-appearance: none;
    border-radius: 0;
  }

  input[type=text]:focus, textarea:focus { border-bottom-color: var(--red); }
  input[type=text]::placeholder, textarea::placeholder { color: var(--border); }

  textarea { resize: none; height: 52px; line-height: 1.6; }

  .hanzi-input input[type=text] {
    font-family: 'Noto Serif SC', serif;
    font-size: 26px;
  }

  .f-hanzi { font-family: 'Noto Serif SC', serif !important; font-size: 18px !important; }
  .f-pinyin { font-style: italic; color: #5a4a3a !important; }

  .btn-row {
    display: flex;
    gap: 8px;
    margin-top: 4px;
  }

  .btn-generate {
    flex: 1;
    padding: 14px 16px;
    background: var(--ink);
    color: var(--paper);
    border: none;
    font-family: 'Noto Sans SC', sans-serif;
    font-size: 13px;
    letter-spacing: 0.08em;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    transition: background 0.2s;
    -webkit-appearance: none;
    border-radius: 0;
  }

  .btn-generate:active { background: #3a2a1a; }
  .btn-generate:disabled { background: var(--faded); cursor: not-allowed; }

  .btn-regenerate {
    padding: 14px 14px;
    background: transparent;
    color: var(--faded);
    border: 1px solid var(--border);
    font-family: 'Noto Sans SC', sans-serif;
    font-size: 12px;
    letter-spacing: 0.04em;
    cursor: pointer;
    display: none;
    align-items: center;
    justify-content: center;
    gap: 6px;
    transition: all 0.2s;
    -webkit-appearance: none;
    border-radius: 0;
    white-space: nowrap;
  }

  .btn-regenerate.visible { display: flex; }
  .btn-regenerate:active { background: var(--paper-dark); }
  .btn-regenerate:disabled { opacity: 0.4; cursor: not-allowed; }

  .spinner {
    width: 13px; height: 13px;
    border: 1.5px solid rgba(245,240,232,0.3);
    border-top-color: var(--paper);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    display: none;
  }

  .btn-generate.loading .spinner { display: block; }
  .btn-generate.loading .btn-text { opacity: 0.6; }

  .spinner-dark {
    width: 12px; height: 12px;
    border: 1.5px solid rgba(140,123,107,0.3);
    border-top-color: var(--faded);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    display: none;
  }

  .btn-regenerate.loading .spinner-dark { display: block; }

  @keyframes spin { to { transform: rotate(360deg); } }

  .error {
    margin-top: 12px;
    padding: 10px 14px;
    background: var(--red-light);
    border-left: 3px solid var(--red);
    font-size: 13px;
    color: var(--red);
    display: none;
    line-height: 1.5;
  }
  .error.visible { display: block; }

  .fields {
    margin-top: 28px;
    opacity: 0;
    transform: translateY(8px);
    transition: opacity 0.4s ease, transform 0.4s ease;
    pointer-events: none;
  }

  .fields.visible {
    opacity: 1;
    transform: translateY(0);
    pointer-events: all;
  }

  .divider {
    height: 1px;
    background: var(--border);
    margin: 4px 0 24px 0;
    position: relative;
  }

  .divider::before {
    content: '例句';
    position: absolute;
    left: 0;
    top: -9px;
    font-size: 10px;
    letter-spacing: 0.1em;
    color: var(--faded);
    background: var(--paper);
    padding-right: 8px;
  }

  .btn-anki {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    z-index: 10;
    padding: 18px 20px;
    padding-bottom: calc(18px + env(safe-area-inset-bottom));
    background: var(--red);
    color: white;
    border: none;
    font-family: 'Noto Sans SC', sans-serif;
    font-size: 14px;
    font-weight: 400;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    cursor: pointer;
    display: none;
    align-items: center;
    justify-content: center;
    gap: 12px;
    transition: background 0.2s;
    -webkit-appearance: none;
    border-radius: 0;
  }

  .btn-anki.visible { display: flex; }
  .btn-anki:active { background: #962d22; }
  .btn-anki .anki-icon { font-family: 'Noto Serif SC', serif; font-size: 18px; font-weight: 700; }

  .success-flash {
    position: fixed;
    inset: 0;
    background: rgba(192,57,43,0.08);
    pointer-events: none;
    opacity: 0;
    z-index: 100;
    transition: opacity 0.3s;
  }
  .success-flash.show { opacity: 1; }
</style>
</head>
<body>

<header>
  <h1>vocabulary builder</h1>
  <div class="char">汉字</div>
</header>

<div class="api-notice">
  Free API key at <a href="https://aistudio.google.com/app/apikey" target="_blank">aistudio.google.com</a> — no credit card needed.
  <div class="api-key-row">
    <input type="password" id="apiKeyInput" placeholder="AIza..." autocomplete="off" spellcheck="false">
    <button class="btn-save-key" onclick="saveKey()">Save</button>
  </div>
  <div class="key-saved" id="keySaved">✓ Key saved</div>
</div>

<main>
  <div class="input-group hanzi-input">
    <label>Hanzi</label>
    <input type="text" id="hanziInput" placeholder="e.g. 坚持" autocomplete="off" autocorrect="off" autocapitalize="none" spellcheck="false">
  </div>

  <div class="btn-row">
    <button class="btn-generate" id="generateBtn" onclick="generate()">
      <div class="spinner"></div>
      <span class="btn-text">Generate card</span>
    </button>
    <button class="btn-regenerate" id="regenerateBtn" onclick="generate()">
      <div class="spinner-dark"></div>
      <span>↺ Regenerate</span>
    </button>
  </div>

  <div class="error" id="errorBox"></div>

  <div class="fields" id="fieldsArea">

    <div class="input-group">
      <label>English</label>
      <input type="text" id="fldEnglish" autocomplete="off" autocorrect="off" spellcheck="false">
    </div>

    <div class="input-group">
      <label>Pinyin</label>
      <input type="text" id="fldPinyin" class="f-pinyin" autocomplete="off" autocorrect="off" spellcheck="false">
    </div>

    <div class="divider"></div>

    <div class="input-group">
      <label>Usage — Hanzi</label>
      <textarea id="fldUsageHanzi" class="f-hanzi" autocomplete="off" autocorrect="off" spellcheck="false"></textarea>
    </div>

    <div class="input-group">
      <label>Usage — Pinyin</label>
      <textarea id="fldUsagePinyin" class="f-pinyin" autocomplete="off" autocorrect="off" spellcheck="false"></textarea>
    </div>

  </div>
</main>

<button class="btn-anki" id="ankiBtn" onclick="sendToAnki()">
  <span class="anki-icon">卡</span>
  Add to Anki
</button>

<div class="success-flash" id="successFlash"></div>

<script>
const PROFILE   = 'User 1';
const DECK      = 'ChineseVocab';
const NOTE_TYPE = 'Chinese';

window.addEventListener('load', () => {
  const saved = localStorage.getItem('gemini_key');
  if (saved) {
    document.getElementById('apiKeyInput').value = saved;
    document.getElementById('keySaved').classList.add('visible');
  }
});

function saveKey() {
  const key = document.getElementById('apiKeyInput').value.trim();
  if (!key) return;
  localStorage.setItem('gemini_key', key);
  document.getElementById('keySaved').classList.add('visible');
}

function getApiKey() {
  return document.getElementById('apiKeyInput').value.trim() || localStorage.getItem('gemini_key') || '';
}

document.getElementById('hanziInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') generate();
});

function showError(msg) {
  const box = document.getElementById('errorBox');
  box.textContent = msg;
  box.classList.add('visible');
}

function hideError() {
  document.getElementById('errorBox').classList.remove('visible');
}

function setLoading(on) {
  const btn   = document.getElementById('generateBtn');
  const regen = document.getElementById('regenerateBtn');
  btn.classList.toggle('loading', on);
  btn.disabled = on;
  regen.classList.toggle('loading', on);
  regen.disabled = on;
}

async function generate() {
  const hanzi = document.getElementById('hanziInput').value.trim();
  if (!hanzi) return;

  const apiKey = getApiKey();
  if (!apiKey) {
    showError('Please enter your Gemini API key above and tap Save.');
    return;
  }

  hideError();
  setLoading(true);
  document.getElementById('fieldsArea').classList.remove('visible');
  document.getElementById('ankiBtn').classList.remove('visible');

  const prompt = `You are a Chinese language expert. Generate a flashcard for the Chinese word/phrase: "${hanzi}"

Return ONLY a valid JSON object with exactly these keys:
{
  "english": "the best English translation",
  "pinyin": "pinyin with tone marks (e.g. nǐ hǎo)",
  "usage_hanzi": "one short natural example sentence in Chinese characters",
  "usage_pinyin": "the same sentence in pinyin with tone marks"
}

Rules:
- english: concise, most common translation
- pinyin: use proper tone diacritics (ā á ǎ à, ē é ě è, etc.)
- usage sentence: short (under 12 words), natural, illustrates the meaning
- Return ONLY the JSON object, no markdown, no explanation`;

  try {
    const response = await fetch(
      `https://generativelanguage.googleapis.com/v1beta/models/gemini-3.1-flash-lite:generateContent?key=${apiKey}`,
      {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          contents: [{ parts: [{ text: prompt }] }],
          generationConfig: { temperature: 0.3, maxOutputTokens: 512 }
        })
      }
    );

    if (!response.ok) {
      const err = await response.json();
      throw new Error(err.error?.message || `API error ${response.status}`);
    }

    const data = await response.json();
    let text = data.candidates?.[0]?.content?.parts?.[0]?.text || '';
    text = text.replace(/```json|```/g, '').trim();
    const card = JSON.parse(text);

    document.getElementById('fldEnglish').value    = card.english      || '';
    document.getElementById('fldPinyin').value     = card.pinyin       || '';
    document.getElementById('fldUsageHanzi').value = card.usage_hanzi  || '';
    document.getElementById('fldUsagePinyin').value= card.usage_pinyin || '';

    document.getElementById('fieldsArea').classList.add('visible');
    document.getElementById('ankiBtn').classList.add('visible');
    document.getElementById('regenerateBtn').classList.add('visible');

  } catch (e) {
    showError('Error: ' + e.message);
  } finally {
    setLoading(false);
  }
}

function sendToAnki() {
  const hanzi   = document.getElementById('hanziInput').value.trim();
  const english = document.getElementById('fldEnglish').value.trim();
  const pinyin  = document.getElementById('fldPinyin').value.trim();
  const usageH  = document.getElementById('fldUsageHanzi').value.trim();
  const usageP  = document.getElementById('fldUsagePinyin').value.trim();

  const enc = encodeURIComponent;
  const url = `anki://x-callback-url/addnote?profile=${enc(PROFILE)}&type=${enc(NOTE_TYPE)}&deck=${enc(DECK)}&fldenglish=${enc(english)}&fldhanzi=${enc(hanzi)}&fldpinyin=${enc(pinyin)}&fldusage%20hanzi=${enc(usageH)}&fldusage%20pinyin=${enc(usageP)}`;

  const flash = document.getElementById('successFlash');
  flash.classList.add('show');
  setTimeout(() => flash.classList.remove('show'), 300);

  window.location.href = url;
}
</script>
</body>
</html>
